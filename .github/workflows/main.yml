
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > user_icon.png
          npm install -g cordova
          cordova create app com.barz.app "barzcrot"
          cd app
          cordova platform add android
          
          # HAPUS ICON DEFAULT CORDOVA SAMPAI KE AKARNYA
          find platforms/android/app/src/main/res/ -name "ic_launcher.png" -delete
          
          # BUAT FOLDER RES DAN MASUKKAN ICON BARU
          mkdir -p res/icon/android
          cp ../user_icon.png res/icon/android/icon.png
          
          # UPDATE CONFIG.XML
          sed -i '/<platform name="android">/a \        <icon src="res/icon/android/icon.png" />' config.xml
          
          # CREATE INDEX HTML
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#05070a;overflow:hidden"><iframe src="https://xxxx.com" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          
          cordova build android
      - name: Send
        run: |
          curl -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk"           "https://api.telegram.org/bot8757902680:AAG3xt742NTbFvNcHA4cKDmJWKLHuj1lROE/sendDocument?chat_id=71727373&caption=%F0%9F%94%B5%20*barzcrot*%20v1.0.0%0AStatus:%20Success%0AOwner:%20James"
